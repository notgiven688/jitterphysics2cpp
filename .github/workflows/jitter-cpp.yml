name: Jitter C++

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  core-tests:
    name: Core Tests (${{ matrix.os }}, ${{ matrix.precision }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        precision:
          - single
          - double

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          precision_flag=OFF
          if [ "${{ matrix.precision }}" = "double" ]; then
            precision_flag=ON
          fi

          cmake -S . -B build \
            -DJITTER_BUILD_TESTS=ON \
            -DJITTER_BUILD_DEMO=OFF \
            -DJITTER_DOUBLE_PRECISION=${precision_flag}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
